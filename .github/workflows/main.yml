name: Crear APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Mostrar estructura y localizar proyecto Android
        id: android_project
        shell: bash
        run: |
          set -euo pipefail
          echo "Contenido encontrado en el repositorio:"
          find . -maxdepth 5 -type f | sort | sed 's#^./##'

          SETTINGS_FILE="$(find . -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) | head -n 1 || true)"
          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::No se encontró settings.gradle ni settings.gradle.kts. Sube el proyecto completo, incluyendo la carpeta android."
            exit 1
          fi

          ANDROID_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Proyecto Android encontrado en: $ANDROID_DIR"
          echo "dir=$ANDROID_DIR" >> "$GITHUB_OUTPUT"

      - name: Preparar Android SDK
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=$ANDROID_HOME"
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Instalar Gradle 8.10.2
        shell: bash
        run: |
          set -euo pipefail
          curl -L --retry 3 https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.10.2/bin" >> "$GITHUB_PATH"

      - name: Comprobar herramientas
        shell: bash
        run: |
          java -version
          gradle --version
          sdkmanager --list | head -n 40

      - name: Compilar APK Debug
        working-directory: ${{ steps.android_project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Localizar APK generada
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          APK_FILE="$(find '${{ steps.android_project.outputs.dir }}/app/build/outputs/apk' -type f -name '*.apk' | head -n 1 || true)"
          if [ -z "$APK_FILE" ]; then
            echo "::error::La compilación terminó, pero no se encontró ningún archivo .apk."
            exit 1
          fi
          echo "APK encontrada: $APK_FILE"
          echo "file=$APK_FILE" >> "$GITHUB_OUTPUT"

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v7
        with:
          name: Control-ESP32-S3-V3-debug-apk
          path: ${{ steps.apk.outputs.file }}
